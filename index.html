<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مايكرو فصيل شرطة فورست - لوحة التحكم الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1424;
            --card-bg: #161f33;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: #232e48;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background-color: #ffffff;
            color: #000000;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .separator {
            border-top: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .macro-row {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            transition: all 0.2s;
        }

        .macro-row:hover {
            border-color: var(--primary);
        }

        .macro-info {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .macro-num {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .macro-input {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            color: #e2e8f0;
            background-color: #0f172a;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .macro-input.editable-mode {
            border-color: var(--primary);
            background-color: #1e293b;
            color: #ffffff;
        }

        .copy-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            min-width: 95px;
        }

            background-color: var(--success);
